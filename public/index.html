<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d1317" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />


    <title>Rifting Wrapped 2025 | Your League of Legends Year in Review</title>
    <meta name="description"
        content="Get a detailed year-end summary of your League of Legends gameplay! Discover your top champions, stats, and trends with a personalized LoL experience." />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <meta name="robots" content="index, follow">

    <link rel="preconnect" href="https://ddragon.leagueoflegends.com" crossorigin />
    <link rel="preconnect" href="https://riftingwrapped.onrender.com" crossorigin />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bricolage+Grotesque:wght@600;700;800;900&display=swap"
        as="style" onload="this.rel='stylesheet'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bricolage+Grotesque:wght@600;700;800;900&display=swap" rel="stylesheet">
    </noscript>



    <!-- Critical for render-blocking req -->
    <style>
        :root {
            --bg-color: #0a0e14;
            --second-bg-color: #141a21;

            --accent-color: #c52184;
            --accent-background-color: #c5218426;
            --text-color: #FFFFFF;
            --text-muted-color: #9DA3A6;

            --font-body: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            --font-display: "Bricolage Grotesque", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;

            /* Type scale — fixed sizes for UI text, fluid clamp()s for the
               slide-deck's big "flex" numbers and hero display moments. */
            --fs-2xs: 12px;
            --fs-xs: 14px;
            --fs-sm: 16px;
            --fs-md: 20px;
            --fs-lg: 24px;
            --fs-xl: 28px;
            --fs-2xl: 36px;
            --fs-display-sm: clamp(20px, 5vw, 32px);
            --fs-display-md: clamp(28px, 7vw, 44px);
            --fs-display-lg: clamp(40px, 12vw, 72px);
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            overscroll-behavior: none;
            font-display: swap;
        }

        #root {
            position: relative;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            min-height: 100vh;
            overscroll-behavior-y: none;

        }

        @media (max-width: 768px) {
            #root {
                min-height: auto;
                height: auto;
            }
        }

        .dropdownItem {
            background-color: var(--second-bg-color);
            border-left: 3px solid transparent;
            transition: border-color 120ms ease, background-color 120ms ease;
        }

        .dropdownItem[aria-selected="true"] {
            background-color: var(--second-bg-color);
            border-left-color: var(--accent-color);
            filter: brightness(1.15);
        }
    </style>



</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3KJTMB7K3W"></script>
<script src="%PUBLIC_URL%/gtag-init.js"></script>

    <div id="root"></div>

</body>



</html>
